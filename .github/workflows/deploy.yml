name: Deploy na server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy fajlova na server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "api.py,ddp_client.py,webapp.html,requirements.txt,tvi_mcp.py,bee.py,cars.json"
          target: /opt/tvi-bee/

      - name: Restart servisa
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            systemctl restart tvi-bee
            sleep 2
            systemctl status tvi-bee --no-pager | tail -5
