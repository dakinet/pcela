name: Deploy na server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Preuzmi fajlove
        uses: actions/checkout@v4

      - name: Kopiraj fajlove na lokaciju
        run: |
          cp api.py ddp_client.py webapp.html requirements.txt tvi_mcp.py bee.py cars.json /opt/tvi-bee/

      - name: Restart servisa
        run: |
          systemctl restart tvi-bee
          sleep 2
          systemctl status tvi-bee --no-pager | tail -5
